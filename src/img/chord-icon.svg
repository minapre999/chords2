<svg
  width="18"
  height="18"
  viewBox="0 0 18 18"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Outer fretboard box -->
  <rect x="2.5" y="2.5" width="13" height="13" rx="2"
        fill="none" stroke="#dddddd" stroke-width="1.2" />

  <!-- Vertical strings -->
  <line x1="6" y1="3.5" x2="6" y2="14.5"
        stroke="#888888" stroke-width="0.8" />
  <line x1="9" y1="3.5" x2="9" y2="14.5"
        stroke="#888888" stroke-width="0.8" />
  <line x1="12" y1="3.5" x2="12" y2="14.5"
        stroke="#888888" stroke-width="0.8" />

  <!-- Horizontal frets -->
  <line x1="3.5" y1="6" x2="14.5" y2="6"
        stroke="#555555" stroke-width="0.8" />
  <line x1="3.5" y1="9" x2="14.5" y2="9"
        stroke="#555555" stroke-width="0.8" />
  <line x1="3.5" y1="12" x2="14.5" y2="12"
        stroke="#555555" stroke-width="0.8" />

  <!-- Chord dots -->
  <circle cx="6" cy="6" r="1.1" fill="#ffffff" />
  <circle cx="9" cy="9" r="1.1" fill="#ffffff" />
  <circle cx="12" cy="12" r="1.1" fill="#ffffff" />
</svg>
