<svg width="20" height="20" viewBox="0 0 20 20"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Full-bleed white background with black border -->
  <rect x="0" y="0" width="20" height="20"
        fill="#fff" stroke="#000" stroke-width="2"/>

  <!-- Top letter (shifted slightly left) -->
  <text x="8" y="8"
        text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="8"
        fill="#000"
        font-weight="700">
    C
  </text>

  <!-- Bottom letter (shifted slightly right) -->
  <text x="12" y="16"
        text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="8"
        fill="#000"
        font-weight="700">
    F
  </text>
</svg>
